services:
  - type: web
    name: groupme-to-discord-notifier
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ALLOWED_USER_IDS
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: GROUPME_BOT_ID
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true